name: Fetch Core Data (yfinance + Angel One)

# ============================================================
# Engine A Dashboard v2.1 — Core Data Fetch + Score Workflow
# ============================================================
# Pipeline:
#   1. Fetch yfinance global data
#   2. Fetch Angel One Indian data
#   3. Fetch bond yields (scraper)
#   4. Compute Engine A score from CSVs
#   5. Commit all results
# ============================================================

on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
    - cron: '30 22 * * 0-4'

  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - 'fetchers/core/**'
      - 'compute/**'
      - '.github/workflows/fetch_core_data.yml'

concurrency:
  group: fetch-core-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch yfinance global data
        run: python fetchers/core/yfinance/fetch_yfinance_core.py
        continue-on-error: true

      - name: Fetch Angel One Indian data
        env:
          ANGEL_API_KEY:      ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE:  ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN:          ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET:  ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python fetchers/core/angel_one/fetch_angel_one_core.py
        continue-on-error: true

      - name: Fetch bond yields (scraper)
        run: python fetchers/core/scrapers/fetch_bonds.py
        continue-on-error: true

      # ============================================================
      # COMPUTE LAYER — Engine A v2.1 Score
      # ============================================================
      - name: Compute Engine A score
        run: python compute/calculate_engine_a_v21.py
        continue-on-error: true

      - name: Commit data + score
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Engine A Auto-Fetch"
          git pull --rebase origin main || true
          git add data/core/*.csv data/core/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            TIMESTAMP=$(TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST")
            git commit -m "Auto-fetch + score: ${TIMESTAMP}"
            git push origin main
            echo "Committed and pushed new data + score."
          fi

      - name: Show Engine A score summary
        if: always()
        run: |
          if [ -f data/core/engine_a_current.json ]; then
            echo "=== Engine A Current Score ==="
            python -c "
import json
with open('data/core/engine_a_current.json') as f:
    d = json.load(f)
print(f'Score:        {d[\"score\"]} / {d[\"max_available_today\"]} ({d[\"score_pct_of_max_available\"]}% of available)')
print(f'Regime:       {d[\"regime\"]}')
print(f'Equity %:     {d[\"regime_equity_pct\"]}%')
print(f'Pending:      {d[\"pending_manual_count\"]} manual inputs')
print(f'Stale/Error:  {d[\"stale_inputs_count\"]} inputs')
print(f'Computed at:  {d[\"computed_at_ist\"]}')
"
          else
            echo "engine_a_current.json not found — compute layer may have failed"
          fi
