name: Fetch Core Data (yfinance + Angel One)

# ============================================================
# Engine A Dashboard v2.1 — Core Data Fetch + Score Workflow
# ============================================================

on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
    - cron: '30 22 * * 0-4'

  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - 'fetchers/core/**'
      - 'compute/**'
      - '.github/workflows/fetch_core_data.yml'

concurrency:
  group: fetch-core-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch yfinance global data
        run: python fetchers/core/yfinance/fetch_yfinance_core.py
        continue-on-error: true

      - name: Fetch Angel One Indian data
        env:
          ANGEL_API_KEY:      ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE:  ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PIN:          ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET:  ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python fetchers/core/angel_one/fetch_angel_one_core.py
        continue-on-error: true

      - name: Fetch bond yields (scraper)
        run: python fetchers/core/scrapers/fetch_bonds.py
        continue-on-error: true

      - name: Compute Engine A score
        run: python compute/calculate_engine_a_v21.py
        continue-on-error: true

      - name: Commit data + score
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Engine A Auto-Fetch"
          git pull --rebase origin main || true
          git add data/core/*.csv data/core/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            TIMESTAMP=$(TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST")
            git commit -m "Auto-fetch + score: ${TIMESTAMP}"
            git push origin main
            echo "Committed and pushed new data + score."
          fi

      - name: Display recent data
        if: always()
        run: |
          echo "=== Engine A Current Score (JSON) ==="
          if [ -f data/core/engine_a_current.json ]; then
            cat data/core/engine_a_current.json
          else
            echo "engine_a_current.json not found"
          fi
          echo ""
          echo "=== Engine A History (last 5 rows) ==="
          if [ -f data/core/engine_a_history.csv ]; then
            tail -5 data/core/engine_a_history.csv
          else
            echo "engine_a_history.csv not found"
          fi
