<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 8-spoke chariot wheel (Sudarshan/Krishna's chakra) -->
  <!-- Outer rim -->
  <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- Inner hub -->
  <circle cx="32" cy="32" r="4.5" fill="currentColor"/>
  <!-- 8 spokes (matching 8 Engine A components) -->
  <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="6" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="58" y2="32"/>
    <line x1="13.6" y1="13.6" x2="50.4" y2="50.4"/>
    <line x1="50.4" y1="13.6" x2="13.6" y2="50.4"/>
  </g>
  <!-- Decorative inner ring -->
  <circle cx="32" cy="32" r="14" stroke="currentColor" stroke-width="1" fill="none" stroke-dasharray="2,3" opacity="0.5"/>
</svg>
